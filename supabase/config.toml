# Turile Cockpit — Supabase project config.
# Project lives in Volodymyr's own Supabase account (never Lovable Cloud).
# Replace project_id with the real ref after `supabase link`.
project_id = "turile-cockpit"

# ── Edge function auth posture ────────────────────────────────────────────────
# Every function MUST declare verify_jwt explicitly here, in the repo.
# (Lesson from the Lovable-managed CRM, where this lived only in a dashboard.)
# Public token-based endpoints (activation, booking-request magic links) set
# verify_jwt = false and do their own token verification + rate limiting.

# Public by design: recipients have no account. The function does its own
# validation (code+email+PIN combined verdict, scrypt KDF, per-IP + global
# sliding windows, per-voucher tarpit) — see its header comment.
[functions.activate-voucher]
verify_jwt = false

# Public by design: authenticated by the stateless HMAC session token minted
# by activate-voucher (SESSION_SIGNING_SECRET), not by a Supabase JWT.
[functions.booking-request]
verify_jwt = false
